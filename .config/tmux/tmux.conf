# true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# prefix（Ctrl+\\に変更。キーボードから直接使わずGhostty経由）
set -g prefix C-\\
unbind C-b

# マウス有効
set -g mouse on

# ウィンドウ番号を1から
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じたら番号を詰める
set -g renumber-windows on

# vi モード
setw -g mode-keys vi

# ステータスバー
set -g status-position top
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=blue,bold] #S "
set -g status-right ""
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=black,bg=blue,bold] #I:#W "

# ペイン分割
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ペイン移動（zoom中はnvim split移動、通常時はtmux pane移動）
bind -n C-h if -F "#{window_zoomed_flag}" "send-keys C-h" "select-pane -L"
bind -n C-j if -F "#{window_zoomed_flag}" "send-keys C-j" "select-pane -D"
bind -n C-k if -F "#{window_zoomed_flag}" "send-keys C-k" "select-pane -U"
bind -n C-l if -F "#{window_zoomed_flag}" "send-keys C-l" "select-pane -R"

# 新しいウィンドウ（左terminal + 右nvim remote-ui）
bind c run-shell "tmux new-window -c '#{pane_current_path}' \\; split-window -h -c '#{pane_current_path}' 'nvim --server /tmp/nvim-#S.sock --remote-ui' \\; select-pane -L"

# 現在のセッションが消えても別のセッションに切り替え
set -g detach-on-destroy off

# escの遅延をなくす
set -sg escape-time 0

# Neovimが外部ファイル変更を検知できるようにする
set -g focus-events on

# ペインリサイズ時にクライアントを更新
set -g aggressive-resize on


# ペインzoomトグル (Cmd+\ via Ghostty)
# zoom解除時はnvimのsplitを閉じてからunzoom（UI崩れ防止）
# zoom後にnvim remote-uiにSIGWINCHを送ってリサイズさせる
bind z if -F "#{window_zoomed_flag}" \
  "send-keys Escape C-w o ; resize-pane -Z ; run-shell 'sleep 0.1 && pkill -WINCH -f \"nvim --server /tmp/nvim-#{session_name}.sock --remote-ui\"'" \
  "resize-pane -Z ; run-shell 'sleep 0.1 && pkill -WINCH -f \"nvim --server /tmp/nvim-#{session_name}.sock --remote-ui\"'"

# ghq + fzf でプロジェクトセッション切り替え (Cmd+r via Ghostty)
bind r display-popup -E -w 80% -h 60% "~/.config/tmux/sessionizer.sh"
